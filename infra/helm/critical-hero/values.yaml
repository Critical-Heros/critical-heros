# Shared config consumed by every subchart. Real secret values go in
# values-secret.yaml (gitignored); copy values-secret.yaml.example to start.
global:
  # ClickHouse (external ClickHouse Cloud in prod; include the scheme in host)
  clickhouse:
    host: "" # e.g. https://xxx.ap-northeast-2.aws.clickhouse.cloud
    port: "8443"
    db: critical_hero
    user: default
    password: ""
  # Postgres (in-cluster service from the db subchart)
  postgres:
    host: critical-hero-postgres
    port: "5432"
    db: critical_hero
    user: postgres
    password: ""
  agentProvider: claude
  anthropicApiKey: ""
  claudeModel: claude-sonnet-4-6
  # In-cluster MCP server address used by the agent (slack pod). Plain http: the pod
  # speaks HTTP on 8401 and TLS is terminated at the ingress for external callers.
  # Lambdas run outside the cluster and use the public https ingress; see infra/terraform/lambda.tf.
  mcpServerUrl: "http://mcp-server.critical-hero.svc.cluster.local:8401/mcp"
  openaiApiKey: ""
  openaiModel: text-embedding-3-small
  githubToken: ""
  githubWebhookSecret: ""
  notionToken: ""
  notionDatabaseId: ""
  slackBotToken: ""
  slackSigningSecret: ""
  slackAppToken: ""
  slackSocketMode: "true"
  slackCriticalChannel: "#critical"
  slackIncidentChannels: "#incidents"
  slackDmUserId: ""
  defaultRepoId: ""
  # The external app Critical Hero watches. One knob drives both the stress flood target and
  # the monitoring rule/route — the stress and monitoring subcharts derive from global.targetApp.
  targetApp:
    name: induck-demo
    namespace: induck
    port: 80
    path: /

mcp-server:
  replicaCount: 1
  image:
    repository: "" # <ecr>/eeeemune/critical-hero, set by CD
    tag: mcp-server
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 8401
    certificateArn: "" # AWS ACM cert ARN (EKS only; ignored on k3s)
  # Traefik ingress + cert-manager TLS (k3s). Set service.type to ClusterIP when enabled.
  ingress:
    enabled: false
    host: "" # e.g. mcp.critical-hero.com
    tls: false
    email: "" # Let's Encrypt registration email
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

slack:
  replicaCount: 1
  image:
    repository: "" # <ecr>/eeeemune/critical-hero, set by CD
    tag: slack
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

db:
  postgres:
    enabled: true
    image: postgres:15
    storage: 5Gi
  clickhouse:
    initSchema: true

stress:
  replicaCount: 1
  image:
    repository: "" # <ecr>/eeeemune/critical-hero, set by CD
    tag: stress
    pullPolicy: Always
  service:
    port: 4545
  # target / path / grafana namespace are derived from global.targetApp.
  grafana: https://grafana.critical-hero.uk
  durationMs: "120000"
  concurrency: "160"
  ingress:
    enabled: true
    host: critical-hero.uk
    path: /stress
    tls: true

monitoring:
  enabled: true
  # app / targetNamespace are derived from global.targetApp.
  cpuThreshold: 0.05
  promRuleNamespace: monitoring
  prometheusReleaseLabel: prometheus
  webhookUrl: http://mcp-server.critical-hero.svc.cluster.local:8401/webhook/prometheus
