# Defaults; overridden by the parent chart's `mcp-server:` and `global:` sections.
replicaCount: 1

image:
  repository: ""
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 8401
  certificateArn: ""

# When ingress is enabled, Traefik fronts the service, so set service.type to ClusterIP.
ingress:
  enabled: false
  host: ""
  tls: false
  email: ""

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
