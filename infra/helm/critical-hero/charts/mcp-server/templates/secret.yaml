apiVersion: v1
kind: Secret
metadata:
  name: mcp-server
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  NODE_ENV: production
  TARGET_ENVIRONMENT: production
  PORT: {{ .Values.service.port | quote }}
  DATABASE_URL: "postgres://{{ .Values.global.postgres.user }}:{{ .Values.global.postgres.password }}@{{ .Values.global.postgres.host }}:{{ .Values.global.postgres.port }}/{{ .Values.global.postgres.db }}"
  CLICKHOUSE_HOST: {{ .Values.global.clickhouse.host | quote }}
  CLICKHOUSE_PORT: {{ .Values.global.clickhouse.port | quote }}
  CLICKHOUSE_DB: {{ .Values.global.clickhouse.db | quote }}
  CLICKHOUSE_USER: {{ .Values.global.clickhouse.user | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.global.clickhouse.password | quote }}
  AGENT_PROVIDER: {{ .Values.global.agentProvider | quote }}
  ANTHROPIC_API_KEY: {{ .Values.global.anthropicApiKey | quote }}
  CLAUDE_MODEL: {{ .Values.global.claudeModel | quote }}
  OPENAI_API_KEY: {{ .Values.global.openaiApiKey | quote }}
  OPENAI_MODEL: {{ .Values.global.openaiModel | quote }}
  GITHUB_TOKEN: {{ .Values.global.githubToken | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.global.githubWebhookSecret | quote }}
  NOTION_TOKEN: {{ .Values.global.notionToken | quote }}
  NOTION_DATABASE_ID: {{ .Values.global.notionDatabaseId | quote }}
  SLACK_BOT_TOKEN: {{ .Values.global.slackBotToken | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.global.slackSigningSecret | quote }}
  SLACK_CRITICAL_CHANNEL: {{ .Values.global.slackCriticalChannel | quote }}
  SLACK_INCIDENT_CHANNELS: {{ .Values.global.slackIncidentChannels | quote }}
  SLACK_DM_USER_ID: {{ .Values.global.slackDmUserId | quote }}
  DEFAULT_REPO_ID: {{ .Values.global.defaultRepoId | quote }}
