# Defaults; overridden by the parent chart's `stress:` section.
replicaCount: 1

image:
  repository: ""
  tag: stress
  pullPolicy: Always

service:
  port: 4545

# Floods the external app Critical Hero watches (induck-demo); Grafana link is the public host.
target: http://induck-demo.induck.svc.cluster.local:80
path: /
grafana: https://grafana.critical-hero.uk
grafanaNs: induck
durationMs: "120000"
concurrency: "160"

# Served at host/path via Traefik with a StripPrefix middleware so the app sees /.
ingress:
  enabled: true
  host: critical-hero.uk
  path: /stress
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 96Mi
  limits:
    cpu: 500m
    memory: 256Mi
