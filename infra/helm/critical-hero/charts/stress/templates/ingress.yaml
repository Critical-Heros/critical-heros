{{- if .Values.ingress.enabled }}
# Strip /stress before the request reaches the app, so it can serve / and /api/* unchanged.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stress-stripprefix
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.ingress.path }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stress
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-stress-stripprefix@kubernetescrd
    {{- if .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- end }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: stress
                port:
                  number: {{ .Values.service.port }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: stress-tls
  {{- end }}
{{- end }}
