# Fires when mcp-server CPU stays high for 30s, i.e. during the booth traffic surge.
# The Prometheus CR uses an empty ruleSelector, so this rule is picked up by labels-or-not.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mcp-server-traffic
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: mcp-server.traffic
      rules:
        - alert: HighCpuLoad
          # Idle mcp-server sits near 0.0002 cores; a request flood pushes it well past 0.15.
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="critical-hero",pod=~"mcp-server.*",container!=""}[1m])) > 0.15
          for: 30s
          labels:
            severity: critical
            service: mcp-server
            namespace: critical-hero
          annotations:
            summary: "mcp-server CPU saturated by traffic surge"
            description: "mcp-server CPU stayed above threshold for 30s, driven by a traffic spike on a single replica."
