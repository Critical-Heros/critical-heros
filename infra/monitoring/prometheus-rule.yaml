# Fires when the induck-demo app (the external app Critical Hero watches) has high CPU for 30s,
# i.e. during the booth traffic surge. The Prometheus CR uses an empty ruleSelector, so this is
# picked up regardless of labels.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: induck-demo-traffic
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: induck-demo.traffic
      rules:
        - alert: HighCpuLoad
          # Idle induck-demo sits near 0.0006 cores; a flood on a single replica pushes it past 0.05.
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="induck",pod=~"induck-demo.*",container!=""}[1m])) > 0.05
          for: 30s
          labels:
            severity: critical
            service: induck-demo
            namespace: induck
          annotations:
            summary: "induck-demo CPU saturated by traffic surge"
            description: "induck-demo CPU stayed above threshold for 30s, driven by a traffic spike."
